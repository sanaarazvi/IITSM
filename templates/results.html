<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body style="font-family: Arial, sans-serif; background: lightblue; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="background: white; padding: 30px; border-radius: 10px; width: 400px; text-align: center; box-shadow: 0px 5px 15px rgba(0,0,0,0.2);">

        <h2 style="margin-bottom: 20px; color: #333;">Your Results</h2>

        <table border="1" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
            <tr style="background-color: #f6c23e; color: white;">
                <th style="padding: 8px;">Subject</th>
                <th style="padding: 8px;">Marks</th>
            </tr>
            {% for row in results %}
            <tr>
                <td style="padding: 8px;">{{ row[0] }}</td>
                <td style="padding: 8px;">{{ row[1] }}</td>
            </tr>
            {% endfor %}
        </table>

        <a href="/dashboard" style="text-decoration: none; color: white; background-color: #4e73df; padding: 10px 20px; border-radius: 5px; font-weight: bold; display: inline-block;">
            Back
        </a>

    </div>
</body>
</html>
